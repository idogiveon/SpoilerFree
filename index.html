<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpoilerFree ⚽</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f; --surface: #13131a; --card: #1a1a24; --card-hover: #21212e;
      --border: #2a2a3a; --accent: #00e5a0; --text: #e8e8f0; --muted: #6b6b80; --danger: #ff4757;
      --live: #ff6b6b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Heebo',sans-serif; min-height:100vh; overflow-x:hidden; }
    body::before { content:''; position:fixed; top:-50%; right:-20%; width:600px; height:600px; background:radial-gradient(circle,rgba(0,229,160,0.04) 0%,transparent 70%); pointer-events:none; z-index:0; }

    header { padding:1.5rem 2rem 1rem; border-bottom:1px solid var(--border); position:relative; z-index:1; }
    .header-inner { max-width:960px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
    .logo { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:2px; color:var(--accent); line-height:1; }
    .logo span { color:var(--muted); font-size:0.8rem; font-family:'Heebo',sans-serif; font-weight:300; display:block; letter-spacing:4px; text-transform:uppercase; margin-top:2px; }

    .league-tabs { display:flex; gap:0.5rem; flex-wrap:wrap; padding:1rem 2rem; max-width:960px; margin:0 auto; position:relative; z-index:1; }
    .tab { padding:0.4rem 1rem; border-radius:100px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'Heebo',sans-serif; font-size:0.85rem; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .tab:hover { border-color:var(--accent); color:var(--accent); }
    .tab.active { background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }

    .matchday-nav { max-width:960px; margin:0 auto; padding:0 2rem 1rem; display:flex; align-items:center; gap:0.75rem; position:relative; z-index:1; }
    .matchday-nav.hidden { display:none; }
    .md-btn { background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'Heebo',sans-serif; font-size:0.85rem; padding:0.4rem 0.9rem; border-radius:8px; cursor:pointer; transition:all 0.2s; }
    .md-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
    .md-btn:disabled { opacity:0.3; cursor:default; }
    .md-label { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--text); letter-spacing:1px; min-width:90px; text-align:center; }
    .md-select { background:var(--surface); border:1px solid var(--border); color:var(--text); font-family:'Heebo',sans-serif; font-size:0.85rem; padding:0.35rem 0.7rem; border-radius:8px; cursor:pointer; outline:none; }

    main { max-width:960px; margin:0 auto; padding:0 2rem 4rem; position:relative; z-index:1; }
    .status-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; flex-wrap:wrap; gap:0.5rem; }
    .match-count { font-size:0.8rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
    .refresh-btn { background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'Heebo',sans-serif; font-size:0.8rem; padding:0.3rem 0.8rem; border-radius:6px; cursor:pointer; transition:all 0.2s; }
    .refresh-btn:hover { border-color:var(--accent); color:var(--accent); }

    .date-group { margin-bottom:1.75rem; }
    .date-label { font-size:0.75rem; color:var(--muted); letter-spacing:3px; text-transform:uppercase; padding:0.4rem 0; margin-bottom:0.6rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:0.75rem; }
    .date-label .weekday { color:var(--accent); font-weight:700; }
    .date-label .is-today { background:var(--accent); color:#000; font-size:0.65rem; padding:0.1rem 0.5rem; border-radius:100px; font-weight:900; }

    .match-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:0.9rem 1.25rem; margin-bottom:0.5rem; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:1rem; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
    .match-card::before { content:''; position:absolute; right:0; top:0; bottom:0; width:3px; background:var(--border); transition:background 0.2s; }
    .match-card:hover { background:var(--card-hover); border-color:rgba(0,229,160,0.3); transform:translateX(-2px); }
    .match-card:hover::before { background:var(--accent); }
    .match-card.is-over { border-color:rgba(0,229,160,0.12); }
    .match-card.is-live { border-color:rgba(255,107,107,0.4); }
    .match-card.is-live::before { background:var(--live); }
    .highlight-badge { position:absolute; left:1rem; top:50%; transform:translateY(-50%); font-size:0.68rem; color:var(--accent); letter-spacing:1px; background:rgba(0,229,160,0.08); padding:0.2rem 0.6rem; border-radius:100px; border:1px solid rgba(0,229,160,0.25); }
    .live-badge { position:absolute; left:1rem; top:50%; transform:translateY(-50%); font-size:0.68rem; color:var(--live); letter-spacing:1px; background:rgba(255,107,107,0.08); padding:0.2rem 0.6rem; border-radius:100px; border:1px solid rgba(255,107,107,0.25); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .team { display:flex; flex-direction:column; gap:0.1rem; }
    .team.home { text-align:right; }
    .team.away { text-align:left; }
    .team-name { font-size:0.95rem; font-weight:700; line-height:1.2; }
    .match-meta { text-align:center; display:flex; flex-direction:column; align-items:center; gap:0.25rem; min-width:65px; }
    .match-time { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; color:var(--accent); letter-spacing:1px; line-height:1; }
    .match-time.past { color:var(--muted); }
    .match-time.live { color:var(--live); }
    .match-vs { font-size:0.6rem; color:var(--muted); letter-spacing:2px; }
    .venue { font-size:0.65rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:110px; }

    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { width:90vw; max-width:900px; background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; transform:translateY(20px); transition:transform 0.3s; }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-header { padding:1rem 1.25rem; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
    .modal-title { font-size:1rem; font-weight:700; }
    .modal-close { background:transparent; border:none; color:var(--muted); font-size:1.4rem; cursor:pointer; line-height:1; padding:0.2rem 0.5rem; border-radius:6px; transition:all 0.2s; }
    .modal-close:hover { color:var(--text); background:var(--border); }

    .video-container { position:relative; padding-bottom:56.25%; height:0; background:#000; }
    .video-container iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; }

    .spoiler-shield { position:absolute; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; z-index:10; padding:2rem; }
    .shield-icon { font-size:3rem; }
    .shield-text { font-size:1rem; color:var(--muted); text-align:center; }
    .sources-row { display:flex; gap:0.75rem; flex-wrap:wrap; justify-content:center; margin-top:0.5rem; }

    .play-btn { background:var(--accent); color:#000; border:none; padding:0.7rem 1.5rem; border-radius:100px; font-family:'Heebo',sans-serif; font-size:0.9rem; font-weight:700; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .play-btn:hover { transform:scale(1.05); }
    .play-btn.extended { background:transparent; border:2px solid var(--accent); color:var(--accent); }
    .play-btn.extended:hover { background:rgba(0,229,160,0.1); }

    .retry-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:0.5rem 1.2rem; border-radius:100px; font-family:'Heebo',sans-serif; font-size:0.8rem; cursor:pointer; transition:all 0.2s; margin-top:0.5rem; }
    .retry-btn:hover { border-color:var(--accent); color:var(--accent); }

    .no-highlight-msg { padding:2.5rem; text-align:center; color:var(--muted); font-size:0.95rem; line-height:1.8; }
    .loading { text-align:center; padding:3rem; color:var(--muted); font-size:0.9rem; letter-spacing:2px; }
    .loading::after { content:''; animation:dots 1.5s infinite; }
    @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }
    .error { background:rgba(255,71,87,0.1); border:1px solid var(--danger); border-radius:10px; padding:1rem 1.5rem; color:var(--danger); font-size:0.9rem; margin:1rem 0; }
    .empty { text-align:center; padding:4rem; color:var(--muted); }

    @media (max-width:600px) {
      header,main,.league-tabs,.matchday-nav { padding-right:1rem; padding-left:1rem; }
      .team-name { font-size:0.82rem; }
      .venue,.highlight-badge,.live-badge { display:none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">SPOILERFREE<span>לוח משחקים ותקצירים</span></div>
  </div>
</header>

<div class="league-tabs">
  <button class="tab active" data-league="worldcup" data-has-matchday="false">🏆 מונדיאל 2026</button>
  <button class="tab" data-league="premier" data-has-matchday="true">🏴󠁧󠁢󠁥󠁮󠁧󠁿 פרמייר ליג</button>
</div>

<div class="matchday-nav hidden" id="matchday-nav">
  <button class="md-btn" id="md-prev">→</button>
  <div class="md-label" id="md-label">מחזור 1</div>
  <button class="md-btn" id="md-next">←</button>
  <select class="md-select" id="md-select"></select>
</div>

<main>
  <div class="status-bar">
    <div class="match-count" id="match-count"></div>
    <button class="refresh-btn" id="refresh-btn">↻ רענן מ-API</button>
  </div>
  <div id="matches-container"><div class="loading">טוען משחקים</div></div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  const API = window.location.origin;
  let currentLeague   = 'worldcup';
  let hasMatchday     = false;
  let currentMatchday = 1;
  let maxMatchday     = 38;

  // ── Utils ──────────────────────────────────────────

  function todayStr() {
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    return `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`;
  }

  function isToday(dateStr) {
    return dateStr === todayStr();
  }

  function isYesterday(dateStr) {
    const y = new Date();
    y.setDate(y.getDate() - 1);
    const pad = n => String(n).padStart(2,'0');
    return dateStr === `${pad(y.getDate())}/${pad(y.getMonth()+1)}/${y.getFullYear()}`;
  }

  function parseDateStr(dateStr) {
    const [d, mo, y] = dateStr.split('/');
    return new Date(`${y}-${mo}-${d}`);
  }

  function groupByDate(matches) {
    const groups = {};
    for (const m of matches) {
      if (!groups[m.date]) groups[m.date] = [];
      groups[m.date].push(m);
    }
    return groups;
  }

  // ── Matchday nav ───────────────────────────────────

  function buildMatchdaySelect(max) {
    const sel = document.getElementById('md-select');
    sel.innerHTML = '';
    for (let i = 1; i <= max; i++) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `מחזור ${i}`;
      sel.appendChild(opt);
    }
    sel.value = currentMatchday;
  }

  function updateMatchdayUI() {
    document.getElementById('md-label').textContent = `מחזור ${currentMatchday}`;
    document.getElementById('md-select').value = currentMatchday;
    document.getElementById('md-prev').disabled = currentMatchday <= 1;
    document.getElementById('md-next').disabled = currentMatchday >= maxMatchday;
  }

  function showMatchdayNav(show) {
    document.getElementById('matchday-nav').classList.toggle('hidden', !show);
  }

  // ── Render ─────────────────────────────────────────

  function renderMatches(matches) {
    const container = document.getElementById('matches-container');
    const countEl   = document.getElementById('match-count');

    if (!matches.length) {
      container.innerHTML = '<div class="empty">אין משחקים להצגה</div>';
      countEl.textContent = '';
      return;
    }

    countEl.textContent = `${matches.length} משחקים`;
    const groups = groupByDate(matches);
    let html = '';
    let todayGroupId = null;

    for (const [date, dayMatches] of Object.entries(groups)) {
      const today     = isToday(date);
      const yesterday = isYesterday(date);
      const weekday   = dayMatches[0].weekday;
      const groupId   = `date-${date.replace(/\//g,'-')}`;
      if (today) todayGroupId = groupId;

      html += `<div class="date-group" id="${groupId}">
        <div class="date-label">
          <span class="weekday">${weekday}</span>
          <span>${date}</span>
          ${today ? '<span class="is-today">היום</span>' : ''}
          ${yesterday ? '<span class="is-today" style="background:var(--muted)">אתמול</span>' : ''}
        </div>`;

      for (const m of dayMatches) {
        const isLive = m.status === 'LIVE';
        const badge = isLive
          ? '<span class="live-badge">🔴 LIVE</span>'
          : (m.is_over ? '<span class="highlight-badge">▶ תקציר</span>' : '');

        const timeClass = isLive ? 'live' : (m.is_over ? 'past' : '');
        const cardClass = isLive ? 'is-live' : (m.is_over ? 'is-over' : '');

        html += `
          <div class="match-card ${cardClass}"
               data-id="${m.id}" data-home="${m.home}"
               data-away="${m.away}" data-is-over="${m.is_over}">
            <div class="team away"><div class="team-name">${m.away}</div></div>
            <div class="match-meta">
              <div class="match-time ${timeClass}">${isLive ? 'LIVE' : m.time}</div>
              <div class="match-vs">VS</div>
              <div class="venue">${m.venue||''}</div>
            </div>
            <div class="team home"><div class="team-name">${m.home}</div></div>
            ${badge}
          </div>`;
      }
      html += '</div>';
    }

    container.innerHTML = html;

    // Scroll to today (or nearest past date)
    if (todayGroupId) {
      setTimeout(() => {
        const el = document.getElementById(todayGroupId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }

    container.querySelectorAll('.match-card').forEach(card => {
      card.addEventListener('click', () => {
        openMatchModal(card.dataset.id, card.dataset.home,
                       card.dataset.away, card.dataset.isOver === 'true');
      });
    });
  }

  // ── Fetch ──────────────────────────────────────────

  async function loadMatches(league, matchday = null, refresh = false) {
    document.getElementById('matches-container').innerHTML = '<div class="loading">טוען משחקים</div>';
    try {
      let url = `${API}/matches/${league}`;
      const params = [];
      if (matchday) params.push(`matchday=${matchday}`);
      if (refresh)  params.push('refresh=true');
      if (params.length) url += '?' + params.join('&');

      const data = await fetch(url).then(r => r.json());
      renderMatches(data.matches);
    } catch (err) {
      document.getElementById('matches-container').innerHTML =
        `<div class="error">שגיאה: ${err.message}<br><small>וודא שהבקנד רץ על localhost:8000</small></div>`;
    }
  }

  async function loadNearestMatchday(league) {
    document.getElementById('matches-container').innerHTML = '<div class="loading">טוען משחקים</div>';
    try {
      const data = await fetch(`${API}/matches/${league}`).then(r => r.json());
      const today = new Date();

      const matchdayDates = {};
      for (const m of data.matches) {
        if (!m.matchday) continue;
        if (!matchdayDates[m.matchday]) matchdayDates[m.matchday] = [];
        matchdayDates[m.matchday].push(parseDateStr(m.date));
      }

      let bestMatchday = 1;
      let bestDiff = Infinity;
      for (const [day, dates] of Object.entries(matchdayDates)) {
        const avg  = dates.reduce((s, d) => s + d.getTime(), 0) / dates.length;
        const diff = Math.abs(avg - today.getTime());
        if (diff < bestDiff) { bestDiff = diff; bestMatchday = parseInt(day); }
      }

      const days = data.matches.map(m => m.matchday).filter(Boolean);
      maxMatchday     = Math.max(...days);
      currentMatchday = bestMatchday;

      buildMatchdaySelect(maxMatchday);
      updateMatchdayUI();
      await loadMatches(league, currentMatchday);
    } catch (err) {
      await loadMatches(league, 1);
    }
  }

  // ── Modal ──────────────────────────────────────────

  let currentModalMatchId = null;

  function openMatchModal(matchId, home, away, isOver) {
    const modal = document.getElementById('modal');
    const title = document.getElementById('modal-title');
    const body  = document.getElementById('modal-body');
    currentModalMatchId = matchId;

    title.textContent = `${home} נגד ${away}`;

    if (!isOver) {
      body.innerHTML = `<div class="no-highlight-msg">⏳ המשחק עדיין לא נגמר<br><small style="opacity:0.5">התקציר יהיה זמין אחרי סיום המשחק</small></div>`;
      modal.classList.add('open');
      return;
    }

    body.innerHTML = '<div class="loading">מחפש תקצירים</div>';
    modal.classList.add('open');

    fetch(`${API}/highlights/${matchId}`)
      .then(r => r.json())
      .then(data => {
        if (!data.available) {
          body.innerHTML = `<div class="no-highlight-msg">⏳ ${data.reason}</div>`;
          return;
        }

        // Collect all play buttons from all sources
        const allBtns = [];
        for (const source of data.sources) {
          if (!source.videos || !source.videos.length) continue;
          for (const v of source.videos) {
            const isExtended = v.extended;
            allBtns.push(
              `<button class="play-btn ${isExtended ? 'extended' : ''}"
                       onclick="loadVideo('${v.video_id}', '${v.embeddable === true}')">
                ▶ ${source.name}${source.videos.length > 1 ? ' — ' + v.label : ''}
              </button>`
            );
          }
        }

        if (!allBtns.length) {
          body.innerHTML = `
            <div class="no-highlight-msg">
              🔍 התקציר עדיין לא הועלה
              <br><small style="opacity:0.5">נסה שוב בעוד כמה דקות</small>
              <br><button class="retry-btn" onclick="retryHighlights('${matchId}', '${home}', '${away}')">↻ נסה שוב</button>
            </div>`;
          return;
        }

        body.innerHTML = `
          <div class="video-container">
            <div class="spoiler-shield" id="shield">
              <div class="shield-icon">🛡️</div>
              <div class="shield-text">בחר גרסה לצפייה</div>
              <div class="sources-row">${allBtns.join('')}</div>
            </div>
            <div id="video-frame"></div>
          </div>`;
      })
      .catch(() => {
        body.innerHTML = `<div class="no-highlight-msg">שגיאה בחיפוש תקציר</div>`;
      });
  }

  async function retryHighlights(matchId, home, away) {
    // Clear cache for this match, then re-open
    try {
      await fetch(`${API}/cache/${matchId}`, { method: 'DELETE' });
    } catch(e) {}
    openMatchModal(matchId, home, away, true);
  }

    function loadVideo(videoId, embeddable) {
        if (embeddable === 'true') {
            document.getElementById('shield').style.display = 'none';
            document.getElementById('video-frame').innerHTML = `
            <iframe
                src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                allowfullscreen></iframe>`;
        } else {
            window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
            closeModal();
        }
    }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    const f = document.getElementById('video-frame');
    if (f) f.innerHTML = '';
    currentModalMatchId = null;
  }

  // ── Events ─────────────────────────────────────────

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentLeague = tab.dataset.league;
      hasMatchday   = tab.dataset.hasMatchday === 'true';
      showMatchdayNav(hasMatchday);
      if (hasMatchday) loadNearestMatchday(currentLeague);
      else loadMatches(currentLeague, null);
    });
  });

  document.getElementById('md-prev').addEventListener('click', () => {
    if (currentMatchday > 1) { currentMatchday--; updateMatchdayUI(); loadMatches(currentLeague, currentMatchday); }
  });
  document.getElementById('md-next').addEventListener('click', () => {
    if (currentMatchday < maxMatchday) { currentMatchday++; updateMatchdayUI(); loadMatches(currentLeague, currentMatchday); }
  });
  document.getElementById('md-select').addEventListener('change', e => {
    currentMatchday = parseInt(e.target.value); updateMatchdayUI(); loadMatches(currentLeague, currentMatchday);
  });

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });
  document.getElementById('refresh-btn').addEventListener('click', () => {
    if (hasMatchday) loadMatches(currentLeague, currentMatchday, true);
    else loadMatches(currentLeague, null, true);
  });
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

  // ── Init ───────────────────────────────────────────
  loadMatches(currentLeague, null);
